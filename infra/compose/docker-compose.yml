services:
  postgres:
    image: postgres:18
    container_name: internal-postgres18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-internal_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: internal-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: internal-api
    depends_on:
      - postgres
      - redis
    environment:
      INTERNAL_DATABASE_URL: postgresql+asyncpg://postgres:postgres@${DATABASE_HOST:-postgres}:5432/internal_platform
      INTERNAL_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: internal-worker
    depends_on:
      - postgres
      - redis
    environment:
      INTERNAL_DATABASE_URL: postgresql+asyncpg://postgres:postgres@${DATABASE_HOST:-postgres}:5432/internal_platform
      INTERNAL_REDIS_URL: redis://redis:6379/0

  beat:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: internal-worker-beat
    depends_on:
      - postgres
      - redis
    command:
      - uv
      - run
      - --project
      - apps/worker
      - celery
      - -A
      - worker.celery_app:celery_app
      - beat
      - --loglevel=INFO
    environment:
      INTERNAL_DATABASE_URL: postgresql+asyncpg://postgres:postgres@${DATABASE_HOST:-postgres}:5432/internal_platform
      INTERNAL_REDIS_URL: redis://redis:6379/0

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: internal-web
    depends_on:
      - api
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.29-alpine
    container_name: internal-nginx
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.5.0
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ../observability/loki-config.yml:/etc/loki/local-config.yaml:ro

  promtail:
    image: grafana/promtail:3.5.0
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ../observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    ports:
      - "3000:3000"

volumes:
  postgres_data:
