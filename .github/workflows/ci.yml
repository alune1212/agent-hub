name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install JS dependencies
        run: bun install

      - name: Lint
        run: bun run turbo lint

      - name: Typecheck
        run: bun run turbo typecheck

      - name: Test
        run: bun run turbo test

      - name: Build
        run: bun run turbo build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python 3.14
        run: uv python install 3.14

      - name: Sync Python dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Ty
        run: uv run ty check

      - name: Pytest
        run: uv run pytest

  api-contract:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python 3.14
        run: uv python install 3.14

      - name: Sync Python dependencies
        run: uv sync

      - name: Export OpenAPI
        run: ./scripts/export_openapi.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install JS dependencies
        run: bun install

      - name: Regenerate API client
        run: bun run gen:api-client

      - name: Ensure clean git
        run: git diff --exit-code
